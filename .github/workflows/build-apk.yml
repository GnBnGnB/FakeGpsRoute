name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git repo

      - name: Check project files
        run: |
          ls -lah repo
          ls -lah repo/FakeGpsRoute

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Download Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip -d gradle-dist
          echo "$PWD/gradle-dist/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: |
          cd repo/FakeGpsRoute
          gradle :app:assembleDebug --stacktrace

      - name: Copy APK to repository
        run: |
          mkdir -p repo/apk
          cp repo/FakeGpsRoute/app/build/outputs/apk/debug/*.apk repo/apk/FakeGpsRoute-debug.apk

      - name: Commit APK
        run: |
          cd repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apk/FakeGpsRoute-debug.apk
          git commit -m "Build debug APK" || echo "No APK changes to commit"
          git push
